<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <style>
        .top{
            text-align: center;
            margin: auto;
        }
        .main{
            margin: auto;
            display: grid;
            grid-template-columns: repeat(12,1fr);
            grid-template-rows: repeat(5,1fr);
            
            background-color: white;
            gap: 15px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
            
        }
        .div1{
            padding: 25px;
            border-radius: 10px;
            background-color: silver;
            text-align: center;
            font-size: x-large;
            font-weight: bolder;
            box-shadow: rgba(0, 0, 0, 0.4) 0px 2px 4px, rgba(0, 0, 0, 0.3) 0px 7px 13px -3px, rgba(0, 0, 0, 0.2) 0px -3px 0px inset;
            
        }
        #enter{
            grid-area: 3/11/4/13;
        }
        #shift{
            grid-area: 4/11/5/13;
        }
        #space{
            grid-area: 5/5/6/9;
        }
    </style>
</head>
<body>
    <h1 class="top">BANKAI !</h1>
    <h2 class="top">Katen Kyo Kotsu Karamatsu Shinju</h2>
    <br><br><br><br>

    <div class="main">
        <div class="div1">~</div>
        <div class="div1">1</div>
        <div class="div1">2</div>
        <div class="div1">3</div>
        <div class="div1">4</div>
        <div class="div1">5</div>
        <div class="div1">6</div>
        <div class="div1">7</div>
        <div class="div1">8</div>
        <div class="div1">9</div>
        <div class="div1">0</div>
        <div class="div1">Delete</div>
        <div class="div1">Tab</div>
        <div class="div1">Q</div>
        <div class="div1">W</div>
        <div class="div1">E</div>
        <div class="div1">R</div>
        <div class="div1">T</div>
        <div class="div1">Y</div>
        <div class="div1">U</div>
        <div class="div1">I</div>
        <div class="div1">O</div>
        <div class="div1">P</div>
        <div class="div1">\</div>
        <div class="div1">Caps</div>
        <div class="div1">A</div>
        <div class="div1">S</div>
        <div class="div1">D</div>
        <div class="div1">F</div>
        <div class="div1">G</div>
        <div class="div1">H</div>
        <div class="div1">J</div>
        <div class="div1">K</div>
        <div class="div1">L</div>
        <div class="div1" id="enter">Enter</div>
        <div class="div1" >Shift</div>
        <div class="div1">Z</div>
        <div class="div1">X</div>
        <div class="div1">C</div>
        <div class="div1">V</div>
        <div class="div1">B</div>
        <div class="div1">N</div>
        <div class="div1">M</div>
        <div class="div1"> < </div>
        <div class="div1"> > </div>
        <div class="div1" id="shift">Shift</div>
        <div class="div1">Windows</div>
        <div class="div1">Ctrl</div>
        <div class="div1">Options</div>
        <div class="div1">Alt</div>
        <div class="div1" id="space">Space</div>
        <div class="div1">Alt</div>
        <div class="div1">Options</div>
        <div class="div1"><</div>
        <div class="div1">></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Weekly Schedule</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 50px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            font-weight: bold;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<h2>Weekly Schedule</h2>

<table>
    <tr>
        <th>Time</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
    </tr>

    <tr>
        <td rowspan="2">Morning</td>
        <td>Math</td>
        <td rowspan="2">Science Lab</td>
        <td rowspan="2"></td>
        <td>History</td>
        <td>English</td>
    </tr>

    <tr>
        <td>Physics</td>
        <td>Geography</td>
        <td>Sports</td>
    </tr>

    <tr>
        <td>Afternoon</td>
        <td colspan="5">Lunch Break</td>
    </tr>

    <tr>
        <td>Evening</td>
        <td>Computer Science</td>
        <td>Art</td>
        <td rowspan="2">Music</td>
        <td>Drama</td>
        <td>Free Period</td>
    </tr>

    <tr>
        <td>Late Evening</td>
        <td colspan="2">Self Study</td>
        <td>Debate</td>
        <td>Sports</td>
    </tr>

</table>

</body>
</html>

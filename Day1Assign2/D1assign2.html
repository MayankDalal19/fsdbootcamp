<!DOCTYPE html>
<html>
<head>
    <title>College Event Registration</title>
</head>

<body>

<h1>College Event Registration 📝</h1>

<form>

    <label>Your Name:</label>
    <input type="text" name="name">
    <br><br>

    <label>Email:</label>
    <input type="email" name="email">
    <br><br>

    <label>Age:</label>
    <input type="number" name="age">
    <br><br>

    <p>Select Event Category:</p>

    <input type="checkbox" name="event" value="coding">
    Coding Hackathon 💻
    <br>

    <input type="checkbox" name="event" value="debate">
    Debate Competition 🎤
    <br>

    <input type="checkbox" name="event" value="sports">
    Sports Tournament ⚽
    <br><br>

    <label>Event Date:</label>
    <input type="date">
    <br><br>

    <label>Preferred Time Slot:</label>
    <input type="time">
    <br><br>

    <input type="submit" value="Register Now">

</form>

</body>
</html>
